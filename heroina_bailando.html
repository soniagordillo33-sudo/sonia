<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heroína Guerrera Bailando – Sonia Gordillo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#06001a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;}
  h1{color:#f9a8d4;font-size:18px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;opacity:.85;}
  svg{width:min(680px,100vw);display:block;}

  @keyframes body-sway  {0%,100%{transform:rotate(-4deg) translateX(-4px)} 50%{transform:rotate(4deg) translateX(4px)}}
  @keyframes head-bob   {0%,100%{transform:rotate(-3deg) translateY(0)}    50%{transform:rotate(3deg) translateY(-5px)}}
  @keyframes arm-l      {0%,100%{transform:rotate(-30deg) translateY(0)}   50%{transform:rotate(20deg) translateY(-12px)}}
  @keyframes arm-r      {0%,100%{transform:rotate(20deg) translateY(-10px)} 50%{transform:rotate(-30deg) translateY(0)}}
  @keyframes leg-l      {0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(10deg)}}
  @keyframes leg-r      {0%,100%{transform:rotate(10deg)}  50%{transform:rotate(-15deg)}}
  @keyframes hair-flow  {0%,100%{transform:skewX(-6deg) scaleX(1.04)} 50%{transform:skewX(6deg) scaleX(.97)}}
  @keyframes cloak-l    {0%,100%{transform:skewX(-8deg) scaleX(1.06)} 50%{transform:skewX(5deg) scaleX(.95)}}
  @keyframes cloak-r    {0%,100%{transform:skewX(8deg) scaleX(1.06)}  50%{transform:skewX(-5deg) scaleX(.95)}}
  @keyframes sparkle    {0%,100%{opacity:.9;transform:scale(1)}  50%{opacity:.15;transform:scale(.4)}}
  @keyframes star-tw    {0%,100%{opacity:.8} 50%{opacity:.1}}
  @keyframes glow-pulse {0%,100%{opacity:.18} 50%{opacity:.38}}
  @keyframes floor-glow {0%,100%{opacity:.22} 50%{opacity:.45}}
  @keyframes note1      {0%{opacity:0;transform:translate(0,0) rotate(-10deg) scale(.6)} 40%{opacity:1;transform:translate(-18px,-28px) rotate(8deg) scale(1)} 100%{opacity:0;transform:translate(-30px,-60px) rotate(20deg) scale(.7)}}
  @keyframes note2      {0%{opacity:0;transform:translate(0,0) rotate(10deg) scale(.6)}  40%{opacity:1;transform:translate(16px,-32px) rotate(-8deg) scale(1)} 100%{opacity:0;transform:translate(26px,-62px) rotate(-22deg) scale(.7)}}
  @keyframes sig-in     {0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)}}

  #dance-body   {transform-origin:340px 440px; animation:body-sway .7s ease-in-out infinite;}
  #dance-head   {transform-origin:340px 320px; animation:head-bob  .7s ease-in-out infinite;}
  #dance-arm-l  {transform-origin:270px 425px; animation:arm-l     .7s ease-in-out infinite;}
  #dance-arm-r  {transform-origin:410px 425px; animation:arm-r     .7s ease-in-out infinite;}
  #dance-leg-l  {transform-origin:300px 635px; animation:leg-l     .7s ease-in-out infinite;}
  #dance-leg-r  {transform-origin:380px 635px; animation:leg-r     .7s ease-in-out infinite;}
  #dance-hair   {transform-origin:340px 270px; animation:hair-flow .7s ease-in-out infinite;}
  #dance-cloak-l{transform-origin:280px 400px; animation:cloak-l   .7s ease-in-out infinite;}
  #dance-cloak-r{transform-origin:400px 400px; animation:cloak-r   .7s ease-in-out infinite;}
  #glow-aura    {animation:glow-pulse 1.4s ease-in-out infinite;}
  #floor-aura   {animation:floor-glow  .7s ease-in-out infinite;}
  .sp1{animation:sparkle 1.1s .1s  ease-in-out infinite;}
  .sp2{animation:sparkle 1.3s .4s  ease-in-out infinite;}
  .sp3{animation:sparkle  .9s .7s  ease-in-out infinite;}
  .sp4{animation:sparkle 1.2s .2s  ease-in-out infinite;}
  .sp5{animation:sparkle  .8s .9s  ease-in-out infinite;}
  .sp6{animation:sparkle 1.4s .55s ease-in-out infinite;}
  .st1{animation:star-tw 2.1s .3s  infinite;}
  .st2{animation:star-tw 1.7s .9s  infinite;}
  .st3{animation:star-tw 2.5s .1s  infinite;}
  .nt1{animation:note1 1.6s .2s  ease-in-out infinite;}
  .nt2{animation:note2 1.6s .8s  ease-in-out infinite;}
  .nt3{animation:note1 1.6s 1.2s ease-in-out infinite;}
  #firma{animation:sig-in .8s .3s ease-out both;}
</style>
</head>
